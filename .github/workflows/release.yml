name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag for manual publish (for example: v0.1.1)"
        required: true
        type: string
      prerelease:
        description: "Publish as a prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RELEASE_TAG: ${{ github.event.inputs.release_tag || github.ref_name }}

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows
            platform: windows/amd64
            artifact_name: windows-amd64
          - os: macos-15-intel
            label: macOS (Intel)
            platform: darwin/amd64
            artifact_name: macos-amd64
          - os: macos-latest
            label: macOS (Apple Silicon)
            platform: darwin/arm64
            artifact_name: macos-arm64
          - os: ubuntu-latest
            label: Linux
            platform: linux/amd64
            artifact_name: linux-amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update
          WEBKIT_PKG="libwebkit2gtk-4.0-dev"
          WEBKIT_TAG=""
          if apt-cache show libwebkit2gtk-4.1-dev >/dev/null 2>&1; then
            WEBKIT_PKG="libwebkit2gtk-4.1-dev"
            WEBKIT_TAG="webkit2_41"
          fi

          sudo apt-get install -yq \
            libgtk-3-dev \
            "$WEBKIT_PKG" \
            pkg-config \
            libgl1-mesa-dev \
            xorg-dev

          echo "WAILS_LINUX_WEBKIT_TAG=${WEBKIT_TAG}" >> "$GITHUB_ENV"

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Build application (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:Path += ";$env:USERPROFILE\go\bin"
          wails build -clean -platform ${{ matrix.platform }}

      - name: Build application (macOS/Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          export PATH="$HOME/go/bin:$PATH"
          if [ "${{ runner.os }}" = "Linux" ] && [ -n "${WAILS_LINUX_WEBKIT_TAG}" ]; then
            wails build -clean -platform "${{ matrix.platform }}" -tags "${WAILS_LINUX_WEBKIT_TAG}"
          else
            wails build -clean -platform "${{ matrix.platform }}"
          fi

      - name: Package asset (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "build/bin/maliang-swarm.exe" "dist/maliang-swarm-${{ env.RELEASE_TAG }}-${{ matrix.artifact_name }}.exe"

      - name: Package asset (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p dist
          APP_PATH="build/bin/maliang-swarm.app"
          BIN_PATH="build/bin/maliang-swarm"

          if [ -d "$APP_PATH" ]; then
            ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "dist/maliang-swarm-${{ env.RELEASE_TAG }}-${{ matrix.artifact_name }}.zip"
          elif [ -f "$BIN_PATH" ]; then
            chmod +x "$BIN_PATH"
            zip -j "dist/maliang-swarm-${{ env.RELEASE_TAG }}-${{ matrix.artifact_name }}.zip" "$BIN_PATH"
          else
            echo "No macOS build output found"
            exit 1
          fi

      - name: Package asset (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p dist
          BIN_PATH="build/bin/maliang-swarm"
          if [ ! -f "$BIN_PATH" ]; then
            echo "No Linux build output found"
            exit 1
          fi

          chmod +x "$BIN_PATH"
          tar -C build/bin -czf "dist/maliang-swarm-${{ env.RELEASE_TAG }}-${{ matrix.artifact_name }}.tar.gz" "maliang-swarm"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.artifact_name }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.prerelease == 'true' }}
          generate_release_notes: true
          files: |
            dist/*
